<html lang="en">
<head>

    <title>SEAS Admin Panel</title>

        body { background: #0f172a; color: white; font-family: sans-serif; padding: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; }
